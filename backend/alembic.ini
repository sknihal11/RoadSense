[alembic]
script_location = migrations
prepend_sys_path = .
sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/roadsense

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[loggers_root]
level = INFO
handlers = console
qualname =

[loggers_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[loggers_alembic]
level = INFO
handlers =
qualname = alembic

[handlers_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatters]
keys = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
